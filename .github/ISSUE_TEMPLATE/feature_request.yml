name: 💡 Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What are you trying to do that's hard or impossible today?
      placeholder: I want to see failing Synthetics checks without opening the browser…
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Proposed solution
      description: What would you like the app to do? A menu item, a notification, a config key?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, or how you work around it now.
  - type: checkboxes
    id: api
    attributes:
      label: Datadog/Jira API
      options:
        - label: I believe the Datadog or Jira API can already support this

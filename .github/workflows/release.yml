name: Release

# Build the native SwiftUI "Datadog Assistant.app" on a macOS runner and
# publish it to a GitHub Release, so users can download + double-click without
# ever building locally. Triggers on a v* tag (or manually).
#
# Assets:
#   Datadog-Assistant.dmg        — drag-to-Applications disk image (preferred)
#   Datadog-Assistant.zip        — plain zip of the .app
#   *.sha256                     — checksums for both

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.4.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build & publish macOS app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Datadog Assistant.app (SwiftPM)
        run: ./Scripts/build-app.sh
        working-directory: swift

      - name: Make DMG (drag to Applications)
        run: |
          mkdir -p dmg-root
          cp -R "swift/build/Datadog Assistant.app" dmg-root/
          ln -s /Applications dmg-root/Applications
          hdiutil create -volname "Datadog Assistant" -srcfolder dmg-root \
            -ov -format UDZO "Datadog-Assistant.dmg"

      - name: Zip the app
        run: |
          ditto -c -k --keepParent "swift/build/Datadog Assistant.app" \
            "Datadog-Assistant.zip"

      - name: SHA-256 checksums
        run: |
          shasum -a 256 "Datadog-Assistant.dmg" > "Datadog-Assistant.dmg.sha256"
          shasum -a 256 "Datadog-Assistant.zip" > "Datadog-Assistant.zip.sha256"
          cat ./*.sha256

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Datadog Assistant ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            Datadog-Assistant.dmg
            Datadog-Assistant.dmg.sha256
            Datadog-Assistant.zip
            Datadog-Assistant.zip.sha256

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Tests & syntax (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Byte-compile all Python (no -O, so asserts stay live)
        run: |
          python -m py_compile $(git ls-files '*.py')

      - name: Smoke test
        run: python test_smoke.py

  shell:
    name: Shell script checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: bash -n (syntax) on every script
        run: |
          for f in $(git ls-files '*.sh'); do
            echo "checking $f"
            bash -n "$f"
          done

      - name: shellcheck (warnings, non-blocking)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          for f in $(git ls-files '*.sh'); do
            shellcheck -S warning "$f" || true
          done

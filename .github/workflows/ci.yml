name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Tests & syntax (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Byte-compile all Python (no -O, so asserts stay live)
        run: |
          python -m py_compile $(git ls-files '*.py')

      - name: Smoke test
        run: python test_smoke.py

      - name: Install engine + onboarding bridge tests
        run: |
          DD_DRY_RUN=1 python installer/test_engine.py
          DD_DRY_RUN=1 python test_onboarding.py

  lint:
    name: Lint (errors & undefined names)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # E9/F only (syntax errors, undefined names, unused imports/variables):
      # real defects in rarely-hit branches, zero style churn.
      - name: ruff check
        run: |
          pip install --quiet ruff
          ruff check --select E9,F .

  macos:
    # The app is macOS-only but the test jobs stub rumps on Linux, so
    # dependency-resolution breakage (rumps/pyobjc/pywebview) and macOS-only
    # import errors would otherwise first surface during a tagged release
    # build. Install the REAL dependencies and import for real.
    name: macOS real-deps import
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pinned runtime deps
        run: pip install -r requirements.txt
      - name: Import with real rumps/pyobjc
        run: |
          python -c "import datadog_assistant as da; print('app OK, v' + da.__version__)"
          python -c "import onboarding_app; print('onboarding OK')"

  shell:
    name: Shell script checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: bash -n (syntax) on every script
        run: |
          for f in $(git ls-files '*.sh'); do
            echo "checking $f"
            bash -n "$f"
          done

      - name: shellcheck (warnings, non-blocking)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          for f in $(git ls-files '*.sh'); do
            shellcheck -S warning "$f" || true
          done

  unattended:
    name: Unattended install contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # With no TTY and env vars set, install.sh must write config.json
      # non-interactively and never block on a prompt. macOS-only tools are
      # stubbed and a fake venv is pre-seeded so this runs on Linux with no network.
      - name: install.sh writes config.json from env (no prompts)
        run: |
          set -euo pipefail
          export HOME="$(mktemp -d)"
          mkdir -p "$HOME/Library/LaunchAgents"
          shim="$(mktemp -d)"
          printf '#!/bin/bash\nexit 0\n' > "$shim/launchctl"
          printf '#!/bin/bash\nexit 0\n' > "$shim/security"
          chmod +x "$shim/launchctl" "$shim/security"
          mkdir -p "$HOME/.datadog-assistant/venv/bin"
          printf '#!/bin/bash\nexit 0\n' > "$HOME/.datadog-assistant/venv/bin/pip"
          chmod +x "$HOME/.datadog-assistant/venv/bin/pip"
          PATH="$shim:$PATH" DD_NONINTERACTIVE=1 DD_SITE=datadoghq.eu \
            DD_APP_SUBDOMAIN=acme DD_TAG_FILTER="team:ci" DD_AUTH=keys \
            DD_API_KEY=dummy DD_APP_KEY=dummy bash install.sh
          python3 - "$HOME/.config/datadog-assistant/config.json" <<'PY'
          import json, sys
          cfg = json.load(open(sys.argv[1]))
          assert cfg["site"] == "datadoghq.eu", cfg
          assert cfg["app_subdomain"] == "acme", cfg
          assert cfg["tag_filter"] == "team:ci", cfg
          assert cfg["auth"] == "keys", cfg
          assert cfg["use_keychain"] is True, cfg
          print("unattended config OK:", cfg)
          PY

      - name: invalid DD_AUTH fails fast
        run: |
          set +e
          export HOME="$(mktemp -d)"
          mkdir -p "$HOME/Library/LaunchAgents" "$HOME/.datadog-assistant/venv/bin"
          shim="$(mktemp -d)"
          printf '#!/bin/bash\nexit 0\n' > "$shim/launchctl"
          printf '#!/bin/bash\nexit 0\n' > "$shim/security"
          printf '#!/bin/bash\nexit 0\n' > "$HOME/.datadog-assistant/venv/bin/pip"
          chmod +x "$shim/launchctl" "$shim/security" "$HOME/.datadog-assistant/venv/bin/pip"
          PATH="$shim:$PATH" DD_NONINTERACTIVE=1 DD_AUTH=bogus bash install.sh
          rc=$?
          if [ "$rc" -eq 0 ]; then echo "expected non-zero exit for bad DD_AUTH"; exit 1; fi
          echo "correctly rejected DD_AUTH=bogus (rc=$rc)"

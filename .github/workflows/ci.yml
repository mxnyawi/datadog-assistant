name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# The product is the native Swift app under swift/. The legacy Python app is
# archived in legacy/python-app/ and no longer gates CI.
jobs:
  swift:
    name: Swift app builds (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: swift build
        run: swift build
        working-directory: swift

      - name: Assemble the .app bundle
        run: CONFIG=debug ./Scripts/build-app.sh
        working-directory: swift

  shell:
    name: Shell script checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: bash -n (syntax) on every script
        run: |
          for f in $(git ls-files '*.sh'); do
            echo "checking $f"
            bash -n "$f"
          done

      - name: shellcheck (warnings, non-blocking)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          for f in $(git ls-files '*.sh'); do
            shellcheck -S warning "$f" || true
          done
